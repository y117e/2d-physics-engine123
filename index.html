<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Physics Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            display: block;
        }
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        input[type="range"] {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="controls">
        <div class="control-group">
            <label>중력 (Gravity): <span id="gravityVal">0.5</span></label>
            <input type="range" id="gravityInput" min="0" max="2" step="0.1" value="0.5">
        </div>
        <div class="control-group">
            <label>반발 계수 (Elasticity): <span id="elasticityVal">0.8</span></label>
            <input type="range" id="elasticityInput" min="0.1" max="1" step="0.05" value="0.8">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 환경 변수 설정
        let gravity = 0.5;
        let elasticity = 0.8;

        const gravityInput = document.getElementById('gravityInput');
        const elasticityInput = document.getElementById('elasticityInput');
        const gravityVal = document.getElementById('gravityVal');
        const elasticityVal = document.getElementById('elasticityVal');

        // 슬라이더 이벤트 연동
        gravityInput.addEventListener('input', (e) => {
    gravity = Number(e.target.value);
    gravityVal.textContent = gravity.toFixed(1);
});

elasticityInput.addEventListener('input', (e) => {
    elasticity = Number(e.target.value);
    elasticityVal.textContent = elasticity.toFixed(2);
});

        class Particle {
            constructor(x, y, radius, color) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                
                this.vx = 2;
                this.vy = 0;
            }

            update() {
                this.vy += gravity;
                
                this.x += this.vx;
                this.y += this.vy;

                // 바닥 충돌 처리 (중복 제거 정리)
                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.vy *= -elasticity;
                }

                // 좌우 벽면 충돌 처리
                if (this.x + this.radius > canvas.width || this.x - this.radius < 0) {
                    this.vx *= -1;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }
        }

        const ball = new Particle(100, 100, 20, '#38bdf8');

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ball.update();
            ball.draw();

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
