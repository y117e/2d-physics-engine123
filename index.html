<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Physics Engine - Wind Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            display: block;
        }
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        input[type="range"] {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="controls">
        <div class="control-group">
            <label>중력 (Gravity): <span id="gravityVal">0.15</span></label>
            <input type="range" id="gravityInput" min="0" max="2" step="0.05" value="0.15">
        </div>
        <div class="control-group">
            <label>반발 계수 (Elasticity): <span id="elasticityVal">0.5</span></label>
            <input type="range" id="elasticityInput" min="0.1" max="1" step="0.05" value="0.5">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- 환경 및 유체 파라미터 ---
        let gravity = 0.15;
        let elasticity = 0.5; 
        const interactionRadius = 45; 
        const pushStrength = 1.2;     
        const damping = 0.98;

        // --- 마우스 및 바람(Wind) 상태 관리 변수 ---
        const mouse = {
            x: -1000,
            y: -1000,
            vx: 0,
            vy: 0,
            radius: 120, // 바람 영향 반경
            strength: 2.5, // 바람 세기
            isHover: false
        };

        const gravityInput = document.getElementById('gravityInput');
        const elasticityInput = document.getElementById('elasticityInput');
        const gravityVal = document.getElementById('gravityVal');
        const elasticityVal = document.getElementById('elasticityVal');

        gravityInput.addEventListener('input', (e) => {
            gravity = Number(e.target.value);
            gravityVal.textContent = gravity.toFixed(2);
        });

        elasticityInput.addEventListener('input', (e) => {
            elasticity = Number(e.target.value);
            elasticityVal.textContent = elasticity.toFixed(2);
        });

        // 마우스 이동 추적
        window.addEventListener('mousemove', (e) => {
            const dx = e.clientX - mouse.x;
            const dy = e.clientY - mouse.y;
            
            // 마우스 이동 속도 감지
            mouse.vx = dx;
            mouse.vy = dy;

            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.isHover = true;
        });

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 8;
                this.color = '#38bdf8';
                
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
            }

            // SPH 유체 힘 연산
            applyFluidForces(particles) {
                for (let other of particles) {
                    if (other === this) continue;

                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < interactionRadius && dist > 0) {
                        const overlap = (1 - dist / interactionRadius);
                        const force = overlap * overlap * pushStrength;

                        const normalX = dx / dist;
                        const normalY = dy / dist;

                        this.vx -= normalX * force;
                        this.vy -= normalY * force;

                        this.vx += (other.vx - this.vx) * 0.05;
                        this.vy += (other.vy - this.vy) * 0.05;
                    }
                }
            }

            // [추가] 마우스 풍압(Wind) 연산
            applyWind(mouse) {
                const dx = this.x - mouse.x;
                const dy = this.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < mouse.radius && dist > 0) {
                    // 마우스 커서에 가까울수록 센 밀침 힘
                    const force = (1 - dist / mouse.radius) * mouse.strength;
                    const normalX = dx / dist;
                    const normalY = dy / dist;

                    this.vx += normalX * force;
                    this.vy += normalY * force;

                    // 마우스 자체 이동 속도도 바람으로 전파
                    this.vx += mouse.vx * 0.05;
                    this.vy += mouse.vy * 0.05;
                }
            }

            update() {
                this.vy += gravity;
                
                this.vx *= damping;
                this.vy *= damping;

                this.x += this.vx;
                this.y += this.vy;

                // 바닥 충돌
                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.vy = -Math.abs(this.vy) * elasticity;
                    this.vx *= 0.9;
                }
                
                // 오른쪽 벽 충돌
                if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx = -Math.abs(this.vx) * elasticity;
                }
                
                // 왼쪽 벽 충돌
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx = Math.abs(this.vx) * elasticity;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }
        }

        const particles = [];

        // 클릭 시 입자 15개 폭포 생성
        window.addEventListener('click', (e) => {
            if (e.target.closest('#controls')) return;

            for (let i = 0; i < 15; i++) {
                const offsetX = (Math.random() - 0.5) * 30;
                const offsetY = (Math.random() - 0.5) * 30;
                particles.push(new Particle(e.clientX + offsetX, e.clientY + offsetY));
            }
        });

        // [추가] 마우스 위치에 바람 방향 화살표 및 반경 가이드 그리기
        function drawWindUI() {
            if (!mouse.isHover) return;

            // 1. 바람 영향 반경 범위 원 그리기
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, mouse.radius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(56, 189, 248, 0.15)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 4]); // 점선 효과
            ctx.stroke();
            ctx.setLineDash([]); // 점선 원복

            // 2. 마우스 이동 속도에 맞춘 화살표 indicator
            const speed = Math.sqrt(mouse.vx * mouse.vx + mouse.vy * mouse.vy);
            if (speed > 1) {
                const angle = Math.atan2(mouse.vy, mouse.vx);
                const arrowLength = Math.min(speed * 2, 50);

                ctx.save();
                ctx.translate(mouse.x, mouse.y);
                ctx.rotate(angle);

                // 화살표 몸통
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(arrowLength, 0);
                ctx.strokeStyle = '#f43f5e';
                ctx.lineWidth = 3;
                ctx.stroke();

                // 화살표 머리
                ctx.beginPath();
                ctx.moveTo(arrowLength, 0);
                ctx.lineTo(arrowLength - 10, -6);
                ctx.lineTo(arrowLength - 10, 6);
                ctx.closePath();
                ctx.fillStyle = '#f43f5e';
                ctx.fill();

                ctx.restore();
            }

            // 프레임 종료 시 마우스 순간속도 감쇠
            mouse.vx *= 0.5;
            mouse.vy *= 0.5;
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 유체 상호작용 & 바람 물리 연산
            particles.forEach(p => {
                p.applyFluidForces(particles);
                p.applyWind(mouse);
            });

            // 위치 업데이트 및 그리기
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // 마우스 바람 UI 그리기
            drawWindUI();

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
