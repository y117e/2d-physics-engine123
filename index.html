<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Fluid Sandbox Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050508;
        }
        canvas {
            display: block;
        }
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
            user-select: none;
        }
        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        input[type="range"] {
            cursor: pointer;
        }
        #info {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="controls">
        <div class="control-group">
            <label>중력 (Gravity): <span id="gravityVal">0.20</span></label>
            <input type="range" id="gravityInput" min="0" max="1" step="0.05" value="0.20">
        </div>
        <div class="control-group">
            <label>반발 계수 (Elasticity): <span id="elasticityVal">0.30</span></label>
            <input type="range" id="elasticityInput" min="0" max="1" step="0.05" value="0.30">
        </div>
        <div id="info">마우스를 누른 채 드래그하면 물이 나옵니다!</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 환경 변수 (모래상자 스타일 최적화)
        let gravity = 0.20;
        let elasticity = 0.30; 
        const interactionRadius = 35; // 입자 반경에 맞춰 압력 범위 조정
        const pushStrength = 0.8;     
        const damping = 0.97;         // 약간의 점성 저항

        // 마우스 및 바람/드래그 상태
        const mouse = {
            x: -1000,
            y: -1000,
            vx: 0,
            vy: 0,
            radius: 100,
            strength: 3.0,
            isPressed: false // 마우스가 눌렸는지 여부 👈 핵심!
        };

        const gravityInput = document.getElementById('gravityInput');
        const elasticityInput = document.getElementById('elasticityInput');
        const gravityVal = document.getElementById('gravityVal');
        const elasticityVal = document.getElementById('elasticityVal');

        gravityInput.addEventListener('input', (e) => {
            gravity = Number(e.target.value);
            gravityVal.textContent = gravity.toFixed(2);
        });

        elasticityInput.addEventListener('input', (e) => {
            elasticity = Number(e.target.value);
            elasticityVal.textContent = elasticity.toFixed(2);
        });

        // 마우스 상호작용 이벤트 리스너들
        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('#controls')) return;
            mouse.isPressed = true;
        });

        window.addEventListener('mouseup', () => {
            mouse.isPressed = false;
        });

        window.addEventListener('mousemove', (e) => {
            mouse.vx = e.clientX - mouse.x;
            mouse.vy = e.clientY - mouse.y;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // 스마트폰 터치 대응
        window.addEventListener('touchstart', (e) => {
            if (e.target.closest('#controls')) return;
            mouse.isPressed = true;
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });
        window.addEventListener('touchend', () => { mouse.isPressed = false; });
        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 5; // 알갱이를 더 촘촘하게 축소! (샌드박스 감성)
                
                // 역동적인 컬러링 (파란색 계열 랜덤)
                const blueHue = Math.floor(Math.random() * 40) + 180;
                this.color = `hsl(${blueHue}, 85%, 60%)`;
                
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
            }

            applyFluidForces(particles) {
                for (let other of particles) {
                    if (other === this) continue;

                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < interactionRadius && dist > 0) {
                        const overlap = (1 - dist / interactionRadius);
                        const force = overlap * overlap * pushStrength;

                        const normalX = dx / dist;
                        const normalY = dy / dist;

                        this.vx -= normalX * force;
                        this.vy -= normalY * force;

                        this.vx += (other.vx - this.vx) * 0.04;
                        this.vy += (other.vy - this.vy) * 0.04;
                    }
                }
            }

            applyWind(mouse) {
                // 마우스를 안 누르고 그냥 지나갈 때는 '바람(풍압)'으로 밀어냄
                if (mouse.isPressed) return; 

                const dx = this.x - mouse.x;
                const dy = this.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < mouse.radius && dist > 0) {
                    const force = (1 - dist / mouse.radius) * mouse.strength;
                    const normalX = dx / dist;
                    const normalY = dy / dist;

                    this.vx += normalX * force;
                    this.vy += normalY * force;
                    this.vx += mouse.vx * 0.03;
                    this.vy += mouse.vy * 0.03;
                }
            }

            update() {
                this.vy += gravity;
                this.vx *= damping;
                this.vy *= damping;

                this.x += this.vx;
                this.y += this.vy;

                // 화면 경계 충돌
                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.vy = -Math.abs(this.vy) * elasticity;
                    this.vx *= 0.85; 
                }
                if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx = -Math.abs(this.vx) * elasticity;
                }
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx = Math.abs(this.vx) * elasticity;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }
        }

        const particles = [];
        const MAX_PARTICLES = 600; // 성능 방어선 (렉 방지)

        // 마우스 이동 방향 화살표 UI
        function drawWindUI() {
            if (mouse.isPressed) return; // 드래그 중엔 화살표 안 그림

            const speed = Math.sqrt(mouse.vx * mouse.vx + mouse.vy * mouse.vy);
            if (speed > 2) {
                const angle = Math.atan2(mouse.vy, mouse.vx);
                const arrowLength = Math.min(speed * 1.5, 40);

                ctx.save();
                ctx.translate(mouse.x, mouse.y);
                ctx.rotate(angle);

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(arrowLength, 0);
                ctx.strokeStyle = 'rgba(244, 63, 94, 0.7)';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.restore();
            }
            mouse.vx *= 0.5;
            mouse.vy *= 0.5;
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // [모래상자 핵심] 마우스를 누르고 있다면 매 프레임마다 마우스 좌표에 알갱이 4개씩 생성!
            if (mouse.isPressed && particles.length < MAX_PARTICLES) {
                for(let i=0; i<4; i++) {
                    const offsetX = (Math.random() - 0.5) * 15;
                    const offsetY = (Math.random() - 0.5) * 15;
                    particles.push(new Particle(mouse.x + offsetX, mouse.y + offsetY));
                }
            }

            // 물리 및 그리기 연산
            particles.forEach(p => {
                p.applyFluidForces(particles);
                p.applyWind(mouse);
            });

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            drawWindUI();

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
