<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Physics Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            display: block;
        }
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        input[type="range"] {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="controls">
        <div class="control-group">
            <label>중력 (Gravity): <span id="gravityVal">0.15</span></label>
            <input type="range" id="gravityInput" min="0" max="2" step="0.05" value="0.15">
        </div>
        <div class="control-group">
            <label>반발 계수 (Elasticity): <span id="elasticityVal">0.5</span></label>
            <input type="range" id="elasticityInput" min="0.1" max="1" step="0.05" value="0.5">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 환경 및 유체 매개변수
        let gravity = 0.15;          // 중력을 살짝 낮추어 바닥 짓눌림 방지
        let elasticity = 0.5; 
        const interactionRadius = 20; // 반경을 늘려 반발력 영역 확대
        const pushStrength = 1.2;     // 반발력 강화
        const damping = 0.98;

        const gravityInput = document.getElementById('gravityInput');
        const elasticityInput = document.getElementById('elasticityInput');
        const gravityVal = document.getElementById('gravityVal');
        const elasticityVal = document.getElementById('elasticityVal');

        gravityInput.addEventListener('input', (e) => {
            gravity = Number(e.target.value);
            gravityVal.textContent = gravity.toFixed(2);
        });

        elasticityInput.addEventListener('input', (e) => {
            elasticity = Number(e.target.value);
            elasticityVal.textContent = elasticity.toFixed(2);
        });

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 8;
                this.color = '#38bdf8';
                
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
            }

            // SPH 기반 압력/점성 힘 연산
            applyFluidForces(particles) {
                for (let other of particles) {
                    if (other === this) continue;

                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < interactionRadius && dist > 0) {
                        const overlap = (1 - dist / interactionRadius);
                        const force = overlap * overlap * pushStrength;

                        const normalX = dx / dist;
                        const normalY = dy / dist;

                        this.vx -= normalX * force;
                        this.vy -= normalY * force;

                        // 점성 적용
                        this.vx += (other.vx - this.vx) * 0.05;
                        this.vy += (other.vy - this.vy) * 0.05;
                    }
                }
            }

            update() {
                this.vy += gravity;
                
                this.vx *= damping;
                this.vy *= damping;

                this.x += this.vx;
                this.y += this.vy;

                // [충돌 판정 각각 분리]
                // 1. 바닥 충돌
                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.vy = -Math.abs(this.vy) * elasticity;
                    this.vx *= 0.9;
                }
                
                // 2. 우측 벽 충돌
                if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx = -Math.abs(this.vx) * elasticity;
                }
                
                // 3. 좌측 벽 충돌
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx = Math.abs(this.vx) * elasticity;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }
        }

        const particles = [];

        window.addEventListener('click', (e) => {
            if (e.target.closest('#controls')) return;

            for (let i = 0; i < 15; i++) {
                const offsetX = (Math.random() - 0.5) * 30;
                const offsetY = (Math.random() - 0.5) * 30;
                particles.push(new Particle(e.clientX + offsetX, e.clientY + offsetY));
            }
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => p.applyFluidForces(particles));
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
