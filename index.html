<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Fluid Sandbox Game - Premium Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050508;
        }
        canvas {
            display: block;
        }
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
            user-select: none;
        }
        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        input[type="range"] {
            cursor: pointer;
        }
        #info {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="controls">
        <div class="control-group">
            <label>중력 (Gravity): <span id="gravityVal">0.15</span></label>
            <input type="range" id="gravityInput" min="0" max="1" step="0.05" value="0.15">
        </div>
        <div class="control-group">
            <label>반발 계수 (Elasticity): <span id="elasticityVal">0.40</span></label>
            <input type="range" id="elasticityInput" min="0" max="1" step="0.05" value="0.40">
        </div>
        <div id="info">드래그: 물 생성 | 우클릭: 지우개 | 이동: 바람 효과</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 환경 변수 튜닝
        let gravity = 0.15; // 바닥 밀도 균형을 위해 중력을 살짝 다운
        let elasticity = 0.40; 
        const interactionRadius = 40; 
        const pushStrength = 1.0;     
        const damping = 0.97;         

        const mouse = {
            x: -1000,
            y: -1000,
            vx: 0,
            vy: 0,
            radius: 100,
            strength: 3.5,
            isPressed: false
        };

        const gravityInput = document.getElementById('gravityInput');
        const elasticityInput = document.getElementById('elasticityInput');
        const gravityVal = document.getElementById('gravityVal');
        const elasticityVal = document.getElementById('elasticityVal');

        gravityInput.addEventListener('input', (e) => {
            gravity = Number(e.target.value);
            gravityVal.textContent = gravity.toFixed(2);
        });

        elasticityInput.addEventListener('input', (e) => {
            elasticity = Number(e.target.value);
            elasticityVal.textContent = elasticity.toFixed(2);
        });

        // 마우스 조작 인터페이스 (우클릭 지우개 포함)
        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('#controls')) return;
            
            if (e.button === 2) { 
                for (let i = particles.length - 1; i >= 0; i--) {
                    const dx = particles[i].x - e.clientX;
                    const dy = particles[i].y - e.clientY;
                    if (Math.sqrt(dx*dx + dy*dy) < 80) {
                        particles.splice(i, 1);
                    }
                }
            } else {
                mouse.isPressed = true;
            }
        });

        window.addEventListener('mouseup', () => { mouse.isPressed = false; });
        window.addEventListener('contextmenu', e => e.preventDefault()); // 우클릭 메뉴 차단

        window.addEventListener('mousemove', (e) => {
            mouse.vx = e.clientX - mouse.x;
            mouse.vy = e.clientY - mouse.y;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 5; 
                
                // 일렁이는 네온 느낌의 HSL 컬러링
                const blueHue = Math.floor(Math.random() * 30) + 190;
                this.color = `hsl(${blueHue}, 90%, 60%)`;
                
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
            }

            applyFluidForces(particles) {
                // 1. 다른 입자들 간의 밀침과 점성
                for (let other of particles) {
                    if (other === this) continue;

                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < interactionRadius && dist > 0) {
                        const overlap = (1 - dist / interactionRadius);
                        const force = overlap * overlap * pushStrength;

                        const normalX = dx / dist;
                        const normalY = dy / dist;

                        this.vx -= normalX * force;
                        this.vy -= normalY * force;

                        this.vx += (other.vx - this.vx) * 0.04;
                        this.vy += (other.vy - this.vy) * 0.04;
                    }
                }

                // 💡 [핵심] 2. 바닥 경계선 압력 필드 (바닥 찰붙음 방지)
                const floorDist = canvas.height - this.y;
                const boundaryRadius = 50; // 바닥 위 50px 영역부터 밀어 올림
                if (floorDist < boundaryRadius && floorDist > 0) {
                    const floorOverlap = (1 - floorDist / boundaryRadius);
                    // 바닥에 가까워질수록 위쪽(-vy)으로 가하는 척력을 급격하게 강화
                    this.vy -= floorOverlap * floorOverlap * 1.5; 
                }
            }

            applyWind(mouse) {
                if (mouse.isPressed) return; 

                const dx = this.x - mouse.x;
                const dy = this.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < mouse.radius && dist > 0) {
                    const force = (1 - dist / mouse.radius) * mouse.strength;
                    const normalX = dx / dist;
                    const normalY = dy / dist;

                    this.vx += normalX * force;
                    this.vy += normalY * force;
                    this.vx += mouse.vx * 0.03;
                    this.vy += mouse.vy * 0.03;
                }
            }

            update() {
                this.vy += gravity;
                this.vx *= damping;
                this.vy *= damping;

                this.x += this.vx;
                this.y += this.vy;

                // 단단한 물리적 경계 충돌 처리
                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.vy = -Math.abs(this.vy) * elasticity;
                    this.vx *= 0.85; 
                }
                if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx = -Math.abs(this.vx) * elasticity;
                }
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx = Math.abs(this.vx) * elasticity;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }
        }

        const particles = [];
        const MAX_PARTICLES = 2500; 

        function animate() {
            // 💡 잔상 효과의 핵심: 투명도가 있는 배경색으로 덮어 씌우기
            ctx.fillStyle = 'rgba(5, 5, 8, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (mouse.isPressed && particles.length < MAX_PARTICLES) {
                for(let i = 0; i < 4; i++) {
                    const offsetX = (Math.random() - 0.5) * 15;
                    const offsetY = (Math.random() - 0.5) * 15;
                    particles.push(new Particle(mouse.x + offsetX, mouse.y + offsetY));
                }
            }

            particles.forEach(p => {
                p.applyFluidForces(particles);
                p.applyWind(mouse);
            });

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();

                if (p.y > canvas.height + 20 || p.x < -20 || p.x > canvas.width + 20) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
